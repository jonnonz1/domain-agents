name: Publish to npm

on:
  release:
    types: [published]

# Least-privilege defaults for the whole workflow.
permissions:
  contents: read

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest

    # Require human approval via this environment (configure reviewers in
    # GitHub → Settings → Environments → npm-publish).
    environment:
      name: npm-publish
      url: https://www.npmjs.com/package/domain-agents

    permissions:
      contents: read
      # Required for Sigstore provenance attestation (not for npm auth —
      # auth uses NPM_TOKEN). Provenance still links the published tarball
      # to this commit and workflow run via GitHub's OIDC.
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(jq -r .version package.json)
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Release tag ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi
          echo "Publishing version $PKG_VERSION"

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
